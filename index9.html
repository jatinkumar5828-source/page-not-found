<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 120px;
            margin: 0;
            color: #000;
        }

        h2 {
            margin: 10px 0;
            color: #333;
        }

        p {
            color: #666;
        }

        ul {
            text-align: left;
            display: inline-block;
            margin-top: 10px;
        }

        a {
            color: blue;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .links {
            margin-top: 20px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background-color: black;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #333;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for is no longer available.</p>

    <p>Some reasons might be:</p>
    <ul>
        <li>The page was removed</li>
        <li>Server is having issues</li>
        <li>Wrong URL entered</li>
    </ul>

    <div class="links">
        <p><strong>Frequently Visited Pages:</strong></p>
        <a href="#">Home</a><br>
        <a href="#">About</a><br>
        <a href="#">Contact</a>
    </div>

    <button onclick="reloadPage()">Try Again</button>
</div>

<script>
    function reloadPage() {
        location.reload();
    }

    // Optional: always force 404 feel
    console.log("404 Error: Page not found");
</script>

</body>
</html>
